<div class="preview-toolbar">
  <!-- Device Toolbar Toggle -->
  <button
    [class.active]="deviceToolbarOpen()"
    (click)="toggleDeviceToolbar()"
    title="Toggle Device Toolbar"
  >
    <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect>
      <line x1="12" y1="18" x2="12.01" y2="18"></line>
    </svg>
  </button>

  <!-- Device Dimensions Bar (Chrome DevTools style) -->
  @if (deviceToolbarOpen()) {
    <div class="device-bar">
      <!-- Preset Dropdown -->
      <select
        class="device-select"
        [value]="selectedPresetLabel()"
        (change)="selectPreset(presets[$any($event.target).selectedIndex])"
      >
        @for (preset of presets; track preset.label) {
          <option [selected]="preset.label === selectedPresetLabel()">{{ preset.label }}</option>
        }
      </select>

      <!-- Width x Height inputs -->
      <div class="dimension-inputs">
        <input
          type="number"
          class="dim-input"
          [value]="customWidth() ?? ''"
          (change)="onWidthChange($any($event.target).value)"
          placeholder="W"
          title="Width (px)"
          min="100"
          max="3840"
        >
        <button class="swap-btn" (click)="swapDimensions()" title="Swap dimensions">
          <svg viewBox="0 0 24 24" width="12" height="12" stroke="currentColor" stroke-width="2" fill="none">
            <polyline points="7 16 3 12 7 8"></polyline>
            <polyline points="17 8 21 12 17 16"></polyline>
            <line x1="3" y1="12" x2="21" y2="12"></line>
          </svg>
        </button>
        <input
          type="number"
          class="dim-input"
          [value]="customHeight() ?? ''"
          (change)="onHeightChange($any($event.target).value)"
          placeholder="H"
          title="Height (px)"
          min="100"
          max="3840"
        >
      </div>

      <!-- Scale -->
      <div class="scale-control">
        <select class="scale-select" (change)="setScale(+$any($event.target).value)">
          <option value="0" [selected]="scale() === 0">Fit</option>
          <option value="0.5" [selected]="scale() === 0.5">50%</option>
          <option value="0.75" [selected]="scale() === 0.75">75%</option>
          <option value="1" [selected]="scale() === 1">100%</option>
          <option value="1.25" [selected]="scale() === 1.25">125%</option>
          <option value="1.5" [selected]="scale() === 1.5">150%</option>
        </select>
      </div>
    </div>
  }

  <div class="toolbar-spacer"></div>

  <!-- Screenshot -->
  <button
    (click)="screenshotRequested.emit()"
    title="Screenshot Selection"
  >
    <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M2 7V2h5"></path>
      <path d="M17 2h5v5"></path>
      <path d="M22 17v5h-5"></path>
      <path d="M7 22H2v-5"></path>
      <rect x="6" y="9" width="12" height="9" rx="1"></rect>
      <path d="M9 9l1-2h4l1 2"></path>
      <circle cx="12" cy="13.5" r="2.5"></circle>
    </svg>
  </button>
  <!-- Refresh -->
  <button
    (click)="reload.emit()"
    title="Refresh Preview"
  >
    <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="23 4 23 10 17 10"></polyline>
      <polyline points="1 20 1 14 7 14"></polyline>
      <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
    </svg>
  </button>
  <!-- Fullscreen -->
  <button
    [class.active]="isFullscreen()"
    (click)="fullscreenToggled.emit()"
    title="Toggle Fullscreen"
  >
    <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path>
    </svg>
  </button>
  <!-- Undock/Dock + DevTools (desktop only) -->
  @if (isDesktop()) {
    <div class="toolbar-separator"></div>
    <button
      (click)="devtoolsRequested.emit()"
      title="Open Preview DevTools"
    >
      <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="16 18 22 12 16 6"></polyline>
        <polyline points="8 6 2 12 8 18"></polyline>
      </svg>
    </button>
    <button
      [class.active]="isUndocked()"
      (click)="undockToggled.emit()"
      [title]="isUndocked() ? 'Dock Preview' : 'Undock Preview'"
    >
      <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
        @if (isUndocked()) {
          <rect x="2" y="4" width="14" height="14" rx="2"/>
          <path d="M22 2v8h-8"/>
          <path d="M22 2l-7 7"/>
        } @else {
          <rect x="2" y="4" width="14" height="14" rx="2"/>
          <path d="M15 2h7v7"/>
          <path d="M17 12l5-5"/>
        }
      </svg>
    </button>
  }
</div>
